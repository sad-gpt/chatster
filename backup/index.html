<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatster</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  
  <h1 class="site-title">Chatster </h1>

  
  <nav class="navbar">
    <a class="nav-left" href="index.html">Chatster </a>
    <div class="nav-right">
      <a href="login.html" class="nav-link">Login</a>
      <a href="auth.html" class="nav-link">Sign Up</a>
    </div>
  </nav>

  
  <form id="genderform">
    <div class="who">
      <label for="gender">I am:</label>
      <select name="gender" id="gender" required>
        <option value="" disabled selected>Select your gender</option>
        <option value="male">MALE</option>
        <option value="female">FEMALE</option>
        <option value="other">OTHERS</option>
      </select>
    </div>

    <div class="am">
      <label for="preferences">I want to chat with:</label>
      <select name="preferences" id="preferences" required>
        <option value="" disabled selected>Select preference</option>
        <option value="male">MALE</option>
        <option value="female">FEMALE</option>
        <option value="other">OTHERS</option>
      </select>
    </div>

    <div class="i">
      <button class="chat-btn" onclick="saveAnonPrefs(event)">Talk Anonymously</button>
    </div>
  </form>

  
  <script>
    function saveAnonPrefs(event) {
      event.preventDefault(); 

      const gender = document.getElementById("gender").value;
      const preference = document.getElementById("preferences").value;

      if (!gender || !preference) {
        alert("Please select both options.");
        return;
      }

    
      localStorage.setItem("anonGender", gender);
      localStorage.setItem("anonPref", preference);

      
      window.location.href = "username.html";
    }
  </script>

</body>
</html>
