<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatster</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>

 
  <header class="navbar">
    <div class="logo"><a href="index.html">Chatster 💬</a></div>
  </header>

 
  <main class="chat-container">

    
    <aside class="sidebar">
      <p class="online-label">Online Now</p>
      <p class="online-count" id="online-count">1,648</p>
    </aside>

    
    <section class="chat-box">
      <div id="connected-to" class="status">
        Connected to: <span id="partner-name">WittyFox234</span>
      </div>

      <div id="messages" class="messages"></div>
      <div id="typing-indicator" style="display: none; font-style: italic;">Stranger is typing...</div>

      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
      </div>

     
      <div class="chat-actions">
        <button id="skipBtn" class="skip-btn">Skip</button>
        <button id="disconnectBtn" class="disconnect-btn" style="display: none;">Disconnect</button>
      </div>

      <div id="typing-status" class="typing" style="display: none;">Typing...</div>
    </section>
  </main>

  
  <div id="ad-popup" class="popup">
    <div class="popup-content">
      <h3>Want to talk directly to a Female?</h3>
      <p>Watch 3 ads and get 3 guaranteed matches!</p>
      <button onclick="watchAds()">Watch Ads</button>
      <button onclick="closePopup()">Maybe Later</button>
    </div>
  </div>

  
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="chat.js"></script>
  <script>
   
    document.getElementById("messageInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("sendBtn").click();
      }
    });

    
    function showDisconnectButton() {
      document.getElementById("disconnectBtn").style.display = "inline-block";
      document.getElementById("skipBtn").style.display = "none";
    }

    function showSkipButton() {
      document.getElementById("skipBtn").style.display = "inline-block";
      document.getElementById("disconnectBtn").style.display = "none";
    }

    
  </script>
</body>
</html>
